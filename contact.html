<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contact.css">

    <title>Document</title>
</head>
<body>
    <marquee>Book Your Appointment with AMARI Fashion House Today</marquee>


    <header>
        <img src="./images/Logos/AmariOfficial.png" alt="amari logo">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="product.html">Collections</a></li>
                <li><a href="board.html">Board of Trustees</a></li>
                <li><a href="event.html">Events</a></li>
                <li><a href="contact.html">Appointments</a></li>
            </ul>
        </nav>
    </header>
<section class="page-header">
    <h1>Book an Appointment</h1>
    <p>Schedule a session with our designers</p>
</section>

<section class="contact-section">

    <form id="appointmentForm">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="Enter your phone number">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label>Appointment Date</label>
            <input type="date" id="date">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label>Message</label>
            <textarea id="message" rows="4" placeholder="Describe your request"></textarea>
            <small class="error"></small>
        </div>

        <button type="submit">Book Appointment</button>

    </form>

</section>

<footer>
    <p>© 2026 AMARI Fashion House. All Rights Reserved.</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
